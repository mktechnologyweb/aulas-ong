<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Editar Curso</title>

<script src="./js/api.js" defer></script>
<script src="./js/editar_curso.js" defer></script>

<style>

body {
    font-family: Arial;
    background: #f1f5f9;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
}

h1 {
    color: #2563eb;
}

.box {
    background: #f8fafc;
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
}

.aula {
    background: white;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #e2e8f0;
}

button {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #2563eb;
    color: white;
}

.danger { background: #ef4444; }
.warning { background: #f59e0b; }

input, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,.5);
}

.modal-content {
    background: white;
    padding: 20px;
    width: 500px;
    margin: 80px auto;
    border-radius: 12px;
}

</style>

</head>

<body>

<div class="container">

    <h1>✏️ Editar Curso</h1>

    <div class="box">
        <label>Nome</label>
        <input id="curso_nome">

        <label>Descrição</label>
        <textarea id="curso_desc"></textarea>

        <label>Área</label>
        <input id="curso_area">

        <button onclick="salvarCurso()">💾 Salvar curso</button>
    </div>

    <h2>🎓 Aulas</h2>

    <div id="listaAulas"></div>

</div>

<!-- MODAL AULA -->
<div class="modal" id="modalAula">

    <div class="modal-content">

        <h3>Editar Aula</h3>

        <input id="aula_id" type="hidden">

        <label>Título</label>
        <input id="aula_titulo">

        <label>Descrição</label>
        <textarea id="aula_desc"></textarea>

        <label>Ordem</label>
        <input id="aula_ordem" type="number">

        <button onclick="salvarAula()">Salvar aula</button>
        <button class="danger" onclick="fecharModal()">Cancelar</button>

    </div>

</div>

</body>

</html>
