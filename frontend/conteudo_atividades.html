<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conteúdo e Atividades</title>

<script src="./js/api.js" defer></script>
<script src="./js/conteudo_atividades.js" defer></script>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #f1f5f9;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
}

.curso-header {
    background: #e2e8f0;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.aula-box {
    background: #fff;
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
    border-left: 4px solid #2563eb;
}

.section {
    margin-left: 15px;
    margin-top: 10px;
}

.small {
    font-size: 13px;
    color: gray;
}

.toggle {
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
    color: #2563eb;
}

.hidden {
    display: none;
}

</style>
</head>

<body>

<div class="container">

    <h2>📚 Conteúdo e Atividades</h2>

    <div id="listaCursos">
        Carregando...
    </div>
    <div id="modalTeoria" class="hidden">
    <div class="modal-box">

        <h3>Editar Teoria</h3>

        <input id="videoTeoria" placeholder="Link do vídeo (YouTube embed)">

        <br><br>

        <textarea id="conteudoTeoria" style="width:100%; height:200px;"></textarea>
<input id="conteudoTeoria" placeholder="Texto da teoria">


        <br><br>

        <button onclick="salvarTeoria()">Salvar</button>
        <button onclick="fecharModalTeoria()">Cancelar</button>

    </div>

</div>
<div id="modal" class="hidden"
style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
padding:40px;
">

<div style="background:white; padding:20px; border-radius:10px; max-width:500px; margin:auto;">

<h3>Editar Atividade</h3>

<input id="pergunta" placeholder="Pergunta">
<input id="op1" placeholder="Opção A">
<input id="op2" placeholder="Opção B">
<input id="op3" placeholder="Opção C">
<input id="op4" placeholder="Opção D">
<input id="correta" placeholder="Correta (A/B/C/D)">

<br><br>

<button onclick="salvarAtividade()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>

</div>

</body>
</html>
