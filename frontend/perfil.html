<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>

    <link rel="stylesheet" href="./css/perfil.css">
    <script src="./js/perfil.js" defer></script>
</head>

<body>


    <!-- CONTEÚDO -->
    <div class="main">

        <header class="header">
            <h1>Meu Perfil</h1>
        </header>

        <div class="perfil-container">

            <div class="card perfil-card">

             
                   <img
        id="fotoPerfil"
        src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
        class="foto-perfil"
    >

   
    
                <h2 id="nome">Carregando...</h2>
                <p id="email">Carregando...</p>

            </div>

            <div class="card">

                <h3>Informações</h3>

                <div class="campo">
                    <label>Nome</label>
                    <input type="text" id="nomeInput">
                </div>

                <div class="campo">
                    <label>Email</label>
                    <input type="email" id="emailInput">
                </div>
 <input
        type="file"
        id="inputFoto"
        accept="image/*"
    >
                <button onclick="salvarPerfil()">
                    Salvar Alterações
                </button>

            </div>

        </div>

    </div>

</body>

</html>
