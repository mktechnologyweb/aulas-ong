services:

  db:
    image: mysql:8
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci # <-- ADICIONE ESTA LINHA

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: educafuturo
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"

    ports:
      - "3308:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d

  backend:
    build: ./app
    restart: always

    ports:
      - "5000:5000"

    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: educafuturo

    depends_on:
      - db

    volumes:
      - ./backend/certificados:/app/certificados

  frontend:
    build: ./frontend
    restart: always

    ports:
      - "80:80"

    depends_on:
      - backend

volumes:
  mysql_data:

steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Passo 1: Build do Backend (usando a pasta 'app')
    - name: Build Backend Image
      run: docker build . --file app/Dockerfile --tag educafuturo-backend:latest

    # Passo 2: Build do Frontend (usando a pasta 'frontend')
    - name: Build Frontend Image
      run: docker build . --file frontend/Dockerfile --tag educafuturo-frontend:latest